name: DAST Security Pipeline

# Dynamic Application Security Testing gegen den Fast-Flow Orchestrator.
#
# Der Orchestrator ist KEINE triviale Standalone-App: Er bootet nur mit einem
# erreichbaren Container-Backend (docker-proxy) und einem vorhandenen
# Worker-Image, verlangt eine beschreibbare Datenbank sowie mindestens einen
# OAuth-Provider. Dieser Workflow stellt genau diesen Stack bereit, wartet per
# /health-Gate auf die App und scannt sie dann mit ZAP (und optional sqlmap).
#
# Die OAuth-Werte hier sind bewusste Dummy-Platzhalter und durch
# SKIP_OAUTH_VERIFICATION=true wirkungslos (keine echten Secrets nötig).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Aktiven ZAP Full-Scan (zap-full-scan.py) statt Baseline ausführen?"
        type: boolean
        default: false
      run_sqlmap:
        description: "sqlmap zusätzlich zu ZAP ausführen?"
        type: boolean
        default: false
  schedule:
    # Jeden Montag 03:00 UTC einen vollständigen Scan fahren
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  APP_PORT: 8000
  APP_IMAGE: fastflow-dast:latest
  WORKER_IMAGE: fastflow-worker:latest
  DAST_NETWORK: dast-net

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Orchestrator-Image bauen
        run: docker build -t "$APP_IMAGE" .

      - name: Worker-Image bauen
        # Wird vom Orchestrator beim Start benötigt (sonst Pull-Fehler)
        run: docker build -f Dockerfile.worker -t "$WORKER_IMAGE" .

      - name: Netzwerk und beschreibbares Daten-Verzeichnis vorbereiten
        run: |
          docker network create "$DAST_NETWORK"
          mkdir -p "$RUNNER_TEMP/dast-data"
          # SQLite läuft als UID 1001 im Container -> Verzeichnis beschreibbar machen
          chmod 777 "$RUNNER_TEMP/dast-data"

      - name: docker-proxy starten (Container-Backend für Executor-Init)
        run: |
          docker run -d --name docker-proxy --network "$DAST_NETWORK" \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            -e CONTAINERS=1 -e IMAGES=1 -e VOLUMES=1 -e EXEC=1 -e NETWORKS=1 \
            -e POST=1 -e DELETE=1 -e STATS=1 -e INFO=1 -e VERSION=1 -e BUILD=1 \
            tecnativa/docker-socket-proxy:latest

      - name: Orchestrator-Container starten
        # ENVIRONMENT=production, damit ZAP die produktive CSP/Header-Konfiguration
        # scannt. Production erzwingt beim Boot einen JWT-Secret >= 32 Zeichen und
        # einen gültigen Fernet-ENCRYPTION_KEY -> beide werden als Wegwerf-Werte
        # pro Lauf frisch generiert (keine echten Secrets).
        run: |
          ENCRYPTION_KEY=$(openssl rand -base64 32 | tr '+/' '-_')
          JWT_SECRET_KEY=$(openssl rand -hex 32)
          docker run -d --name fastflow-dast --network "$DAST_NETWORK" \
            -p ${APP_PORT}:8000 \
            -e ENVIRONMENT=production \
            -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
            -e ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            -e SKIP_OAUTH_VERIFICATION=true \
            -e GITHUB_CLIENT_ID=dast-dummy \
            -e GITHUB_CLIENT_SECRET=dast-dummy \
            -e DOCKER_PROXY_URL=http://docker-proxy:2375 \
            -e WORKER_BASE_IMAGE="$WORKER_IMAGE" \
            -v "$RUNNER_TEMP/dast-data:/app/data" \
            "$APP_IMAGE"

      - name: Warten bis App erreichbar ist
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${APP_PORT}/health" > /dev/null; then
              echo "App ist erreichbar"
              curl -s "http://localhost:${APP_PORT}/health"; echo
              exit 0
            fi
            echo "Warte auf App... ($i/60)"
            sleep 2
          done
          echo "App nicht erreichbar, breche ab. Logs:"
          docker logs fastflow-dast
          exit 1

      - name: Scan-Modus bestimmen (Baseline vs. Full)
        # Baseline (schnell, rein passiv) bei jedem Push/PR. Aktiver Full-Scan nur
        # beim wöchentlichen Schedule oder wenn manuell full_scan=true gewählt wurde.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_scan }}" = "true" ]; }; then
            echo "ZAP_SCRIPT=zap-full-scan.py" >> "$GITHUB_ENV"
            echo "ZAP_SCAN_MODE=full" >> "$GITHUB_ENV"
            echo "Modus: FULL (aktiver Scan via zap-full-scan.py)"
          else
            echo "ZAP_SCRIPT=zap-baseline.py" >> "$GITHUB_ENV"
            echo "ZAP_SCAN_MODE=baseline" >> "$GITHUB_ENV"
            echo "Modus: BASELINE (passiver Scan via zap-baseline.py)"
          fi

      - name: JWT-Admin-Token für authentifizierten Scan erzeugen
        # Ein bloß selbst-signiertes JWT reicht NICHT: get_current_user verlangt
        # zusätzlich eine in der DB persistierte Session (get_session_by_token) und
        # einen existierenden User. Deshalb wird der Token im laufenden Container
        # über die App-eigene Logik erzeugt (nutzt automatisch den JWT_SECRET_KEY
        # aus dessen Env) und ein passender Admin-User + Session angelegt.
        run: |
          docker exec -i fastflow-dast python - <<'PY'
          from datetime import timedelta
          from sqlmodel import Session, select
          from app.core.database import engine
          from app.models import User, UserRole, UserStatus
          from app.auth.auth import create_access_token, create_session

          USERNAME = "dast-admin"
          with Session(engine) as db:
              user = db.exec(select(User).where(User.username == USERNAME)).first()
              if user is None:
                  user = User(
                      username=USERNAME,
                      email="dast-admin@example.invalid",
                      role=UserRole.ADMIN,
                      status=UserStatus.ACTIVE,
                      blocked=False,
                  )
                  db.add(user)
                  db.commit()
                  db.refresh(user)
              # Laufzeit großzügig wählen, damit der Token einen langen Full-Scan überlebt.
              token = create_access_token(USERNAME, expires_delta=timedelta(hours=3))
              create_session(db, user, token)
              with open("/tmp/dast_token", "w") as f:
                  f.write(token)
          PY
          TOKEN=$(docker exec fastflow-dast cat /tmp/dast_token)
          if [ -z "$TOKEN" ]; then
            echo "::error::JWT-Token-Erzeugung fehlgeschlagen. Container-Logs:"
            docker logs fastflow-dast
            exit 1
          fi
          # Token in Runner-Logs maskieren und für Folge-Steps bereitstellen.
          echo "::add-mask::$TOKEN"
          echo "ZAP_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "JWT-Admin-Token erzeugt und Session persistiert."

      - name: ZAP Scan (Baseline oder Full)
        # ZAP läuft in eigenem Container und wird deshalb ins selbe Docker-Netz
        # gehängt; das Ziel wird per Container-Namen adressiert (nicht localhost,
        # das im ZAP-Container auf ZAP selbst zeigen würde).
        #
        # Authentifizierung: Über die ZAP-"replacer"-Add-on-Config (per -z an den
        # ZAP-Daemon durchgereicht) wird bei JEDEM Request ein
        # "Authorization: Bearer <TOKEN>"-Header gesetzt bzw. ersetzt.
        run: |
          mkdir -p "$RUNNER_TEMP/zap-wrk"
          cp .zap/rules.tsv "$RUNNER_TEMP/zap-wrk/rules.tsv"
          chmod -R 777 "$RUNNER_TEMP/zap-wrk"
          set +e
          # -I: WARN-Findings sind informativ und brechen den Build NICHT
          # (konsistent zu .zap/rules.tsv: Header=WARN, nur SQLi/XSS=FAIL).
          # -a: zusätzliche (alpha) Passive-Scan-Regeln.
          # -z: ZAP-Daemon-Config -> replacer-Regel injiziert den Auth-Header.
          docker run --rm --network "$DAST_NETWORK" \
            -v "$RUNNER_TEMP/zap-wrk:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            "$ZAP_SCRIPT" -t "http://fastflow-dast:8000" \
              -c rules.tsv -a -I -r report_html.html -J report_json.json \
              -z "-config replacer.full_list(0).description=auth \
                  -config replacer.full_list(0).enabled=true \
                  -config replacer.full_list(0).matchtype=REQ_HEADER \
                  -config replacer.full_list(0).matchstr=Authorization \
                  -config replacer.full_list(0).regex=false \
                  -config 'replacer.full_list(0).replacement=Bearer ${ZAP_AUTH_TOKEN}'"
          echo "zap_exit=$?" >> "$GITHUB_ENV"
          set -e

      - name: ZAP Report als Artifact hochladen
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: |
            ${{ runner.temp }}/zap-wrk/report_html.html
            ${{ runner.temp }}/zap-wrk/report_json.json
          if-no-files-found: ignore

      # --- sqlmap: nur bei manuellem Trigger mit run_sqlmap=true oder beim wöchentlichen Scan ---
      - name: sqlmap installieren
        if: always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_sqlmap == 'true') || github.event_name == 'schedule')
        run: git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git sqlmap-dir

      - name: sqlmap Scan ausführen
        if: always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_sqlmap == 'true') || github.event_name == 'schedule')
        run: |
          # ACHTUNG: Fast-Flow hat keinen offenen /search?q=-Endpoint. Die meisten
          # API-Routen liegen hinter Auth (/api/...). Vor produktivem Einsatz hier
          # einen echten parametrisierten Endpoint eintragen – idealerweise über
          # eine gespeicherte Request mit Session-Cookie/Token: -r request.txt
          python3 sqlmap-dir/sqlmap.py \
            -u "http://localhost:${APP_PORT}/api/health?q=test" \
            --batch --level=2 --risk=1 \
            --output-dir=sqlmap-results \
          || true

      - name: sqlmap Ergebnisse prüfen
        if: always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_sqlmap == 'true') || github.event_name == 'schedule')
        run: |
          if grep -rl "is vulnerable" sqlmap-results/ 2>/dev/null; then
            echo "::error::sqlmap hat eine mögliche SQL-Injection gefunden!"
            exit 1
          fi
          echo "Keine SQL-Injection gefunden."

      - name: sqlmap Ergebnisse als Artifact hochladen
        if: always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_sqlmap == 'true') || github.event_name == 'schedule')
        uses: actions/upload-artifact@v7
        with:
          name: sqlmap-results
          path: sqlmap-results/
          if-no-files-found: ignore

      - name: ZAP Findings auswerten (Build ggf. brechen)
        if: always()
        run: |
          # zap-baseline.py / zap-full-scan.py: 0 = keine WARN/FAIL, sonst Findings
          # oder interner Fehler.
          if [ "${zap_exit:-3}" = "0" ]; then
            echo "ZAP (${ZAP_SCAN_MODE:-baseline}): keine nicht-ignorierten Findings."
          else
            echo "::error::ZAP (${ZAP_SCAN_MODE:-baseline}) meldet Findings oder Fehler (exit ${zap_exit:-unset}). Details im zap-report-Artifact."
            exit 1
          fi

      - name: Container und Netzwerk aufräumen
        if: always()
        run: |
          docker rm -f fastflow-dast docker-proxy || true
          docker network rm "$DAST_NETWORK" || true
