{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fastflow.secretName" . }}
  labels:
    {{- include "fastflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  SKIP_OAUTH_VERIFICATION: {{ .Values.secrets.skipOauthVerification | quote }}
  {{- if .Values.secrets.initialAdminEmail }}
  INITIAL_ADMIN_EMAIL: {{ .Values.secrets.initialAdminEmail | quote }}
  {{- end }}
  {{- if or .Values.secrets.github.clientId .Values.secrets.github.clientSecret }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.github.clientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.github.clientSecret | quote }}
  {{- end }}
  {{- if or .Values.secrets.google.clientId .Values.secrets.google.clientSecret }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.google.clientSecret | quote }}
  {{- end }}
  {{- if or .Values.secrets.microsoft.clientId .Values.secrets.microsoft.clientSecret }}
  MICROSOFT_CLIENT_ID: {{ .Values.secrets.microsoft.clientId | quote }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.secrets.microsoft.clientSecret | quote }}
  MICROSOFT_TENANT_ID: {{ .Values.secrets.microsoft.tenantId | quote }}
  {{- end }}
  {{- if or .Values.secrets.custom.clientId .Values.secrets.custom.clientSecret }}
  CUSTOM_OAUTH_CLIENT_ID: {{ .Values.secrets.custom.clientId | quote }}
  CUSTOM_OAUTH_CLIENT_SECRET: {{ .Values.secrets.custom.clientSecret | quote }}
  CUSTOM_OAUTH_AUTHORIZE_URL: {{ .Values.secrets.custom.authorizeUrl | quote }}
  CUSTOM_OAUTH_TOKEN_URL: {{ .Values.secrets.custom.tokenUrl | quote }}
  CUSTOM_OAUTH_USERINFO_URL: {{ .Values.secrets.custom.userinfoUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.gitSync.token }}
  GIT_SYNC_TOKEN: {{ .Values.secrets.gitSync.token | quote }}
  {{- end }}
  {{- if .Values.secrets.gitSync.deployKey }}
  GIT_SYNC_DEPLOY_KEY: {{ .Values.secrets.gitSync.deployKey | quote }}
  {{- end }}
  {{- range $key, $value := .Values.secrets.extraSecretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
