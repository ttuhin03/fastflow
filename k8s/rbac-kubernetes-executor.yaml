# RBAC für Pipeline-Executor im Kubernetes-Modus
# Minimal: Jobs verwalten, Pods/Logs lesen, optionale Pod-Metriken (metrics-server)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastflow-executor
  labels:
    app: fastflow-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fastflow-executor-role
  labels:
    app: fastflow-orchestrator
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fastflow-executor-rolebinding
  labels:
    app: fastflow-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fastflow-executor-role
subjects:
  - kind: ServiceAccount
    name: fastflow-executor
    namespace: default
