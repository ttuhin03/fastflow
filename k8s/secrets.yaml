# Fast-Flow Secrets – sensible Umgebungsvariablen
# Entspricht .env.example – optionale Variablen unten auskommentiert
#
# ENCRYPTION_KEY und JWT_SECRET_KEY MÜSSEN vor dem Anwenden befüllt werden
# (bewusst leer gelassen – ein fester Wert im Repo wäre ein bekanntes,
# öffentlich einsehbares Secret und in Produktion angreifbar):
#   ENCRYPTION_KEY:  python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   JWT_SECRET_KEY:  python3 -c "import secrets; print(secrets.token_urlsafe(48))"
# Produktion: Alle Werte ersetzen und Datei nicht mit echten Secrets committen
# (siehe k8s/README.md).
---
apiVersion: v1
kind: Secret
metadata:
  name: fastflow-secrets
  labels:
    app: fastflow-orchestrator
type: Opaque
stringData:
  # Pflicht
  ENCRYPTION_KEY: ""
  JWT_SECRET_KEY: ""

  # OAuth – mind. ein Provider nötig. In K8s/Minikube: "true", damit Startup ohne
  # ausgehendes DNS im Pod funktioniert (OAuth-Login im Browser funktioniert weiterhin).
  SKIP_OAUTH_VERIFICATION: "false"
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  INITIAL_ADMIN_EMAIL: ""

  # Google OAuth (optional)
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""

  # Microsoft OAuth (optional)
  # MICROSOFT_CLIENT_ID: ""
  # MICROSOFT_CLIENT_SECRET: ""
  # MICROSOFT_TENANT_ID: "common"

  # Custom OAuth (optional)
  # CUSTOM_OAUTH_CLIENT_ID: ""
  # CUSTOM_OAUTH_CLIENT_SECRET: ""

  # Git-Sync: PAT (HTTPS) oder Deploy Key (SSH) – optional, je nach URL-Typ
  # GIT_SYNC_TOKEN: "ghp_..."
  # GIT_SYNC_DEPLOY_KEY: "-----BEGIN OPENSSH PRIVATE KEY-----\n..."

  # S3/MinIO Log-Backup (optional)
  # S3_ACCESS_KEY: ""
  # S3_SECRET_ACCESS_KEY: ""

  # E-Mail (optional)
  # SMTP_PASSWORD: ""

  # Microsoft Teams (optional)
  # TEAMS_WEBHOOK_URL: ""
